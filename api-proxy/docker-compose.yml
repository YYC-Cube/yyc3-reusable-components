# ════════════════════════════════════════════════════════════════════
# YYC³ AI Family - Docker Compose 一键编排
# YYC³ AI Family - Docker Compose One-Click Orchestration
# ════════════════════════════════════════════════════════════════════
# Version: 0.9.4 [Personalize]
# Architecture: PostgreSQL 15 + API Proxy + Frontend (3 containers)
#
# 启动方式 / Startup:
#   docker compose up -d              # 后台启动全部三容器
#   docker compose up -d --build      # 重新构建并启动
#   docker compose logs -f yyc3-proxy # 查看代理日志
#   docker compose down               # 停止并移除
#   docker compose down -v            # 停止并删除数据卷（慎用）
#
# 端口映射 / Port Mapping:
#   5432 → PostgreSQL 15
#   3721 → API Proxy (Express)
#   5173 → Frontend (Vite)
# ════════════════════════════════════════════════════════════════════

services:
  # ──────────────────────────────────────────────
  # Container 1: PostgreSQL 15 数据库
  # ──────────────────────────────────────────────
  yyc3-postgres:
    image: postgres:15-alpine
    container_name: yyc3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yyc3_family
      POSTGRES_USER: yyc3_admin
      POSTGRES_PASSWORD: ${YYC3_PG_PASSWORD:-yyc3_dev_2026}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      # 数据持久化 / Data persistence
      - yyc3_pgdata:/var/lib/postgresql/data
      # DDL 自动初始化（首次启动时执行） / Auto-init DDL on first start
      - ./docs/postgresql-15-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yyc3_admin -d yyc3_family"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - yyc3-network

  # ──────────────────────────────────────────────
  # Container 2: API 代理服务 (Express :3721)
  # ──────────────────────────────────────────────
  yyc3-proxy:
    build:
      context: ./server
      dockerfile: Dockerfile.txt
    container_name: yyc3-proxy
    restart: unless-stopped
    depends_on:
      yyc3-postgres:
        condition: service_healthy
    environment:
      YYC3_PORT: 3721
      YYC3_PG_HOST: yyc3-postgres
      YYC3_PG_PORT: 5432
      YYC3_PG_DATABASE: yyc3_family
      YYC3_PG_USER: yyc3_admin
      YYC3_PG_PASSWORD: ${YYC3_PG_PASSWORD:-yyc3_dev_2026}
      YYC3_PG_SSL: disable
      YYC3_PG_POOL_SIZE: 10
      YYC3_CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:5174"
      YYC3_AUTH_TOKEN: ${YYC3_AUTH_TOKEN:-}
      YYC3_LOG_LEVEL: info
    ports:
      - "3721:3721"
    networks:
      - yyc3-network

  # ──────────────────────────────────────────────
  # Container 3: 前端开发服务 (Vite :5173)
  # ──────────────────────────────────────────────
  yyc3-frontend:
    image: node:20-alpine
    container_name: yyc3-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      yyc3-proxy:
        condition: service_healthy
    volumes:
      # 挂载项目根目录（排除 node_modules）/ Mount project root (exclude node_modules)
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    networks:
      - yyc3-network

# ──────────────────────────────────────────────
# Volumes: 数据卷 / Data Volumes
# ──────────────────────────────────────────────
volumes:
  yyc3_pgdata:
    driver: local
    name: yyc3_pgdata

# ──────────────────────────────────────────────
# Networks: 网络 / Networks
# ──────────────────────────────────────────────
networks:
  yyc3-network:
    driver: bridge
    name: yyc3-network